<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Verify Hash Calculator</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --bg-grad-top: #eef2f9;
            --surface: #ffffff;
            --ink: #0f172a;
            --ink-soft: #475569;
            --ink-faint: #64748b;
            --line: #e2e8f0;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --accent-soft: #eff4ff;
            --radius: 16px;
            --shadow-sm: 0 1px 2px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.08);
            --shadow-md: 0 6px 18px rgba(15,23,42,0.08);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: radial-gradient(1200px 500px at 50% -120px, var(--bg-grad-top), var(--bg));
            color: var(--ink);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5em;
            color: var(--ink);
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.9em;
            color: var(--ink-faint);
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            min-height: 180px;
            font-family: var(--mono);
            font-size: 0.95em;
            line-height: 1.6;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            resize: vertical;
            background: var(--surface);
            color: var(--ink);
            box-shadow: var(--shadow-sm);
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .display-area {
            width: 100%;
            min-height: 100px;
            font-family: var(--mono);
            font-size: 0.95em;
            line-height: 1.6;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--accent-soft);
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 24px;
        }
        .newline-marker {
            color: var(--accent);
            user-select: none;
        }
        .hash-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .hash-output {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.9em;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            word-break: break-all;
            min-height: 44px;
            box-shadow: var(--shadow-sm);
        }
        .hash-output.empty {
            color: var(--ink-faint);
            font-style: italic;
            font-family: inherit;
        }
        .copy-btn {
            padding: 10px 16px;
            border: 1px solid transparent;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s;
        }
        .copy-btn:hover {
            background: var(--accent-dark);
        }
        .copy-btn:disabled {
            background: var(--line);
            color: var(--ink-faint);
            cursor: default;
        }
        .copy-btn.copied {
            background: #22c55e;
            color: #fff;
            border-color: #22c55e;
        }
        .section {
            margin-bottom: 24px;
        }
        .note {
            font-size: 0.8em;
            color: var(--ink-faint);
            margin-top: 8px;
            line-height: 1.5;
        }
        .note code {
            font-family: var(--mono);
            background: var(--accent-soft);
            color: var(--accent-dark);
            border: 1px solid #e3ebfb;
            border-radius: 5px;
            padding: 1px 5px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hash Calculator</h1>
        <p class="subtitle">Paste claim text, see the normalized SHA-256 hash.</p>

        <div class="section">
            <label for="input">Claim text (without the verify: line)</label>
            <textarea id="input" placeholder="Paste or type claim text here..."></textarea>
        </div>

        <div class="section">
            <label>What you typed &mdash; with visible newlines, whether deliberate or accidental</label>
            <div class="display-area" id="display"></div>
        </div>

        <div class="section">
            <label>After normalization &mdash; this is what gets hashed</label>
            <div class="display-area" id="normalizedDisplay"></div>
        </div>

        <div class="section">
            <label>SHA-256 (after normalization)</label>
            <div class="hash-row">
                <div class="hash-output empty" id="hash">Type or paste text above</div>
                <button class="copy-btn" id="copyBtn" disabled>Copy</button>
            </div>
            <p class="note">
                Text is run through <code>normalizeText()</code> before hashing:
                leading/trailing whitespace stripped per line, multiple spaces collapsed,
                blank lines removed, Unicode quotes and dashes normalized.
            </p>
        </div>
    </div>

    <script src="normalize.js"></script>
    <script>
        const input = document.getElementById('input');
        const display = document.getElementById('display');
        const normalizedDisplay = document.getElementById('normalizedDisplay');
        const hashEl = document.getElementById('hash');
        const copyBtn = document.getElementById('copyBtn');

        let currentHash = '';

        // Escape HTML and render newlines as a visible blue ↵ marker
        function withNewlineMarkers(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<span class="newline-marker">↵</span>\n');
        }

        async function update() {
            const raw = input.value;

            // Display with visible newline markers
            if (raw.length === 0) {
                display.innerHTML = '';
                normalizedDisplay.innerHTML = '';
                hashEl.textContent = 'Type or paste text above';
                hashEl.classList.add('empty');
                copyBtn.disabled = true;
                currentHash = '';
                return;
            }

            // Build display with newline markers
            display.innerHTML = withNewlineMarkers(raw);

            // Strip verify: or vfy: line if accidentally pasted as the last line
            const lines = raw.split('\n');
            if (lines.length > 0 && /^\s*(verify|vfy)\s*:\s*/i.test(lines[lines.length - 1])) {
                lines.pop();
            }
            const stripped = lines.join('\n');

            // Normalize and hash
            const normalized = normalizeText(stripped);

            // Show the normalized text — this is what actually gets hashed
            normalizedDisplay.innerHTML = withNewlineMarkers(normalized);

            const hash = await sha256(normalized);
            currentHash = hash;

            hashEl.textContent = hash;
            hashEl.classList.remove('empty');
            copyBtn.disabled = false;
        }

        input.addEventListener('input', update);

        copyBtn.addEventListener('click', () => {
            if (!currentHash) return;
            navigator.clipboard.writeText(currentHash).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        });
    </script>
</body>
</html>
