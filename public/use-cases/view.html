<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Case - OCR Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../formatShowcaseInjector.js"></script>
    <style>
        :root {
            --bg: #f6f8fb;
            --bg-grad-top: #eef2f9;
            --surface: #ffffff;
            --ink: #0f172a;
            --ink-soft: #475569;
            --ink-faint: #64748b;
            --line: #e2e8f0;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --accent-soft: #eff4ff;
            --accent-ring: rgba(37, 99, 235, 0.18);
            --radius: 16px;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.08);
            --shadow-md: 0 6px 18px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 18px 40px rgba(37, 99, 235, 0.18);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image: radial-gradient(1200px 500px at 50% -120px, var(--bg-grad-top) 0%, var(--bg) 70%);
            min-height: 100vh;
            padding: 28px 20px 56px;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .content-card {
            background: var(--surface);
            color: var(--ink-soft);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 32px 40px;
            box-shadow: var(--shadow-md);
            text-align: left;
        }
        .content-card h1 {
            color: var(--ink);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            font-size: 1.8em;
        }
        .meta {
            color: var(--ink-faint);
            font-size: 0.9em;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }
        .meta span {
            margin-right: 20px;
        }
        .action-footer {
            margin-top: 36px;
            padding: 22px 24px;
            background: var(--accent-soft);
            border: 1px solid #e3ebfb;
            border-left: 4px solid var(--accent);
            border-radius: 10px;
        }
        .action-footer h2 {
            margin-top: 0 !important;
            font-size: 1.15em !important;
        }
        .action-footer p {
            font-size: 0.95em;
            color: var(--ink-soft);
        }
        .action-footer .action-links {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .action-footer .action-links a {
            display: inline-block;
            padding: 9px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            background: var(--accent);
            color: #fff;
        }
        .action-footer .action-links a.secondary {
            background: var(--surface);
            color: var(--accent);
            border: 1px solid var(--line);
        }
        .action-footer .action-links a:hover {
            opacity: 0.92;
        }
        .content-card h2 {
            color: var(--ink);
            margin-top: 28px;
            margin-bottom: 12px;
            font-size: 1.4em;
            letter-spacing: -0.01em;
        }
        .content-card h3 {
            color: var(--accent-dark);
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 1.15em;
        }
        .content-card p {
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .content-card ul, .content-card ol {
            margin-left: 24px;
            margin-bottom: 12px;
        }
        .content-card li {
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .content-card strong {
            color: var(--ink);
        }
        .content-card code {
            font-family: var(--mono);
            background: var(--accent-soft);
            color: var(--accent-dark);
            border: 1px solid #e3ebfb;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.88em;
        }
        .content-card pre {
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }
        .content-card pre code {
            background: none;
            padding: 0;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--ink-faint);
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        /* Styles for inline document examples */
        .example-document {
            border: 2px solid #333;
            padding: 20px;
            margin: 20px 0;
            background: #fafafa;
            font-family: 'Courier New', monospace;
        }
        .example-document .header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 12px;
        }
        .example-document .verify-url {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed #999;
            font-size: 0.85em;
        }
        .certification-box {
            border: 3px solid black;
            padding: 24px;
            margin: 20px 0;
            background: white;
        }
        .registration-marks {
            /* Visual indicator for registration marks */
        }

        /* Verify hover effect brackets */
        [verifiable-text] {
            display: inline-block;
            max-width: 0;
            overflow: hidden;
            color: #c00;
            font-weight: bold;
            font-size: inherit;
            transition: max-width 0.15s;
        }
        [verifiable-text="start"] {
            vertical-align: text-top;
        }
        [verifiable-text="end"] {
            vertical-align: text-bottom;
        }
        [data-verify-line] {
            cursor: pointer;
            transition: color 0.15s;
        }
        [data-verify-line]:hover {
            color: #c00 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Use Cases</a>

        <div class="content-card">
            <div id="content" class="loading">Loading...</div>
        </div>
    </div>

    <script>
        // Initialize hover effects for verify line examples
        function initVerifyHover() {
            document.querySelectorAll('[data-verify-line]').forEach(verifyLine => {
                const group = verifyLine.dataset.verifyLine;
                const startBracket = document.querySelector(`[verifiable-text="start"][data-for="${group}"]`);
                const endBracket = document.querySelector(`[verifiable-text="end"][data-for="${group}"]`);

                if (startBracket && endBracket) {
                    verifyLine.addEventListener('mouseover', () => {
                        startBracket.style.maxWidth = '1em';
                        endBracket.style.maxWidth = '1em';
                    });
                    verifyLine.addEventListener('mouseout', () => {
                        startBracket.style.maxWidth = '0';
                        endBracket.style.maxWidth = '0';
                    });
                }

            });
        }

        // Get the document slug from URL
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('doc');

        if (!slug) {
            document.getElementById('content').innerHTML =
                '<div class="error">No document specified. Use ?doc=filename</div>';
        } else {
            // Fetch the markdown file
            fetch(`${slug}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('Document not found');
                    return response.text();
                })
                .then(markdown => {
                    // Parse YAML frontmatter
                    let content = markdown;
                    let meta = {};

                    if (markdown.startsWith('---')) {
                        const endIndex = markdown.indexOf('---', 3);
                        if (endIndex !== -1) {
                            const frontmatter = markdown.substring(3, endIndex).trim();
                            content = markdown.substring(endIndex + 3).trim();

                            // Simple YAML parsing for frontmatter
                            frontmatter.split('\n').forEach(line => {
                                const colonIndex = line.indexOf(':');
                                if (colonIndex !== -1) {
                                    const key = line.substring(0, colonIndex).trim();
                                    let value = line.substring(colonIndex + 1).trim();
                                    // Remove quotes
                                    if ((value.startsWith('"') && value.endsWith('"')) ||
                                        (value.startsWith("'") && value.endsWith("'"))) {
                                        value = value.slice(1, -1);
                                    }
                                    meta[key] = value;
                                }
                            });
                        }
                    }

                    // Update page title
                    if (meta.title) {
                        document.title = meta.title + ' - OCR Verification';
                    }

                    // Build HTML
                    let html = '';
                    if (meta.title) {
                        html += `<h1>${meta.title}</h1>`;
                    }
                    if (meta.category || meta.volume) {
                        html += '<div class="meta">';
                        if (meta.category) html += `<span><strong>Category:</strong> ${meta.category}</span>`;
                        if (meta.volume) html += `<span><strong>Volume:</strong> ${meta.volume}</span>`;
                        if (meta.verificationMode) {
                            const modeLabels = { clip: 'Clip', camera: 'Camera', both: 'Both' };
                            html += `<span><strong>Mode:</strong> ${modeLabels[meta.verificationMode] || meta.verificationMode}</span>`;
                        }
                        html += '</div>';
                    }

                    // Render markdown (marked.js handles inline HTML automatically)
                    html += marked.parse(content);

                    // Action footer: turn every use-case page into a landing page
                    const docName = meta.title || 'this document type';
                    html += `
                    <div class="action-footer">
                        <h2>Make ${docName} verifiable</h2>
                        <p><strong>Who acts:</strong> the organization that issues these documents &mdash; or the
                        software platform that generates them on its behalf.
                        <strong>Effort:</strong> a pilot is a sprint, not a migration; one footer line on the
                        document plus static hash hosting is enough.
                        <strong>Cost:</strong> the standard is open (Apache 2.0) &mdash; no fees, no vendor, no
                        lock-in.</p>
                        <div class="action-links">
                            <a href="../quickstart.html">15-minute quickstart</a>
                            <a class="secondary" href="../for-issuers.html">For issuers</a>
                            <a class="secondary" href="../for-saas.html">For SaaS builders</a>
                            <a class="secondary" href="mailto:paul@hammant.org?subject=Live%20Verify%3A%20${encodeURIComponent(docName)}">Talk about a pilot</a>
                        </div>
                    </div>`;

                    const contentEl = document.getElementById('content');
                    contentEl.classList.remove('loading');
                    contentEl.innerHTML = html;

                    // Parse format preferences from frontmatter
                    let formats = ['gmail', 'pdf', 'email-attachment']; // default formats
                    if (meta.showFormats) {
                        try {
                            // Parse JSON array format: ["gmail", "pdf", "whatsapp"]
                            if (meta.showFormats.startsWith('[')) {
                                formats = JSON.parse(meta.showFormats);
                            } else {
                                // Parse YAML format: gmail, pdf, whatsapp
                                formats = meta.showFormats.split(',').map(f => f.trim().toLowerCase());
                            }
                        } catch (e) {
                            console.warn('Failed to parse showFormats:', e);
                        }
                    } else {
                        // Parse individual format flags: gmail: yes, pdf: yes, etc.
                        const availableFormats = ['gmail', 'pdf', 'email-attachment', 'sms', 'whatsapp', 'discord'];
                        formats = availableFormats.filter(fmt => {
                            const value = meta[fmt];
                            return value && (value.toLowerCase() === 'yes' || value.toLowerCase() === 'true');
                        });
                        // Maintain order if any found
                        if (formats.length === 0) {
                            formats = ['gmail', 'pdf', 'email-attachment']; // fallback to defaults
                        }
                    }

                    // Set format-showcase div data attribute
                    const showcase = contentEl.querySelector('[data-format-showcase]');
                    if (showcase) {
                        showcase.setAttribute('data-format-showcase', JSON.stringify(formats));
                        // Re-initialize format showcase with new formats
                        if (window.initFormatShowcase) {
                            window.initFormatShowcase();
                        }
                    }

                    // Initialize verify hover effects
                    initVerifyHover();
                })
                .catch(error => {
                    document.getElementById('content').innerHTML =
                        `<div class="error">${error.message}</div>`;
                });
        }
    </script>
</body>
</html>
